name: Publish to PyPI

# Triggered automatically when a version tag is pushed:
#   git tag v0.2.0 && git push origin v0.2.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # required for PyPI trusted publishing (OIDC)

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Build wheel and sdist
        run: uv build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/earthcatalog/

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses OIDC trusted publishing — no API token needed.
        # Configure trusted publisher at https://pypi.org/manage/project/earthcatalog/settings/publishing/
